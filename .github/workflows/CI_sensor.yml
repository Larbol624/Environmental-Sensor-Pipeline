name: CI_Sensor

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  spark_tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Start spark tests
      run: docker compose -f docker-compose-test.yml up --build --abort-container-on-exit

    - name: Stop containers
      if: always()
      run: docker compose -f docker-compose-test.yml down
  
  integration_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create network
      run: docker network create env_network

    - name: Start integration test
      run: docker compose -f docker-compose-integration.yml up --build --abort-on-container-exit

    - name: Stop containers
      if: always() 
      run: docker compose -f docker-compose-integration.yml down 
  
  

