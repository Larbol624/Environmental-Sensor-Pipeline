name: CI_Sensor

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  unittest:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - run: docker compose -f docker-compose-base.yml up --build -d
    
    - run: pip install -r requirements.text
    
    - run: python -m unittest discover -s tests/unittest
