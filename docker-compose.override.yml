services:
  jupyter:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.notebook
    container_name: pyspark_ESDP
    ports:
      - "8888:8888"  
    volumes:
      - ./notebooks:/workspace
      - ./checkpoints:/checkpoints
    networks:
      - env_network
    depends_on:
      - kafka
      - postgres

  pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin_ESDP
      restart: always
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@example.com
        PGADMIN_DEFAULT_PASSWORD: admin123
      ports:
        - "5050:80"
      networks:
        - env_network
      