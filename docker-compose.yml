version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_ESDP
    restart: always
    env_file:
      - configs/postgres/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:${PGDATA}
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - env_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ESDP
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - env_network
      
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper_ESDP
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - env_network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka_ESDP
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper_ESDP:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - ./configs/kafka:/etc/kafka-init
    command: > 
      bash -c " 
        echo 'Waiting for Zookeeper...'
        until nc -z zookeeper_ESDP 2181; do
          sleep 2
        done
        echo 'Zookeeper ready, starting Kafka...'
        /etc/confluent/docker/run & 
        sleep 10
        echo 'Creating topics...'
        bash /etc/kafka-init/create_topics.sh
        wait
      "
    networks:
      - env_network

  jupyter:
    image: jupyter/pyspark-notebook
    container_name: pyspark_ESDP
    ports:
      - "8888:8888"  
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src/spark_consumers:/home/jovyan/scripts
    environment:
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=jupyter
      - PYSPARK_DRIVER_PYTHON_OPTS="notebook --ip=0.0.0.0 --allow-root"
    networks:
      - env_network

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:

networks:
  env_network:
    driver: bridge